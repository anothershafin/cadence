<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F766E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cadence">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Cadence</title>
<style>
:root{
  --paper:#FAFAF7; --surface:#FFFFFF; --surface-2:#F4F3EE;
  --border:#ECEAE3; --border-strong:#DEDBD2;
  --ink:#1A1A17; --muted:#76736B; --faint:#A8A59C;
  --accent:#0F766E; --accent-soft:#E2F1EE; --accent-ink:#0B5C55;
  --amber:#C2740A; --amber-soft:#FBEDD6;
  --danger:#C0392B; --danger-soft:#FBE7E4;
  --c-321:#5B5BD6; --c-321-bg:#EBEBFB;
  --c-360:#0F766E; --c-360-bg:#E1F0ED;
  --c-421:#C2740A; --c-421-bg:#FBEDD6;
  --c-304:#C9356B; --c-304-bg:#FBE5EE;
  --c-custom:#475569; --c-custom-bg:#EEF1F4;
  --shadow:0 1px 2px rgba(26,26,23,.04), 0 4px 16px rgba(26,26,23,.05);
  --shadow-lg:0 8px 40px rgba(26,26,23,.16);
  --radius:18px; --radius-sm:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
html[data-theme="dark"]{
  --paper:#121317; --surface:#1A1C22; --surface-2:#22242C;
  --border:#2A2D36; --border-strong:#373B46;
  --ink:#ECEAE3; --muted:#9A9DA8; --faint:#6B6F7B;
  --accent:#2DD4BF; --accent-soft:#16302E; --accent-ink:#5EEAD4;
  --amber:#E0A052; --amber-soft:#352713;
  --danger:#E0675C; --danger-soft:#3A1F1C;
  --c-321:#8B8BF0; --c-321-bg:#21223A;
  --c-360:#2DD4BF; --c-360-bg:#15302E;
  --c-421:#E0A052; --c-421-bg:#33260F;
  --c-304:#EA6E9C; --c-304-bg:#371927;
  --c-custom:#94A3B8; --c-custom-bg:#262A33;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
  --shadow-lg:0 10px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); background:var(--paper); color:var(--ink);
  line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
}
.tnum{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:inherit}
::placeholder{color:var(--faint)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- App shell ---------- */
.app{max-width:540px;margin:0 auto;min-height:100vh}
.screen{display:none;padding:0 18px;animation:fade .28s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Header ---------- */
.head{padding:calc(var(--safe-top) + 22px) 0 6px;display:flex;justify-content:space-between;align-items:flex-start}
.head .eyebrow{font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 2px}
.head h1{margin:0;font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.head .sub{margin:3px 0 0;color:var(--muted);font-size:14.5px}
.icon-btn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);flex:none;transition:transform .15s}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.section-label{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 12px}
.section-label h2{margin:0;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.section-label .count{font-size:12.5px;color:var(--faint);font-weight:600}

/* ---------- Now / Next focus card ---------- */
.focus{padding:20px;margin-top:18px;position:relative;overflow:hidden}
.focus .tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.focus .tag .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.focus .tag.live .dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.focus h3{margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em}
.focus .meta{margin:6px 0 0;color:var(--muted);font-size:14px;display:flex;flex-wrap:wrap;gap:4px 14px}
.focus .meta b{color:var(--ink);font-weight:600}
.focus .count-pill{position:absolute;top:18px;right:18px;text-align:right}
.focus .count-pill .big{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--accent)}
.focus .count-pill .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.focus.rest h3{color:var(--muted);font-weight:700;font-size:18px}

/* progress ring inside focus when free */
.ring-row{display:flex;align-items:center;gap:16px}
.ring{width:58px;height:58px;flex:none}
.ring circle{fill:none;stroke-width:7}
.ring .track{stroke:var(--surface-2)}
.ring .bar{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-label{font-size:13px;font-weight:700;fill:var(--ink)}

/* ---------- Timeline spine ---------- */
.timeline{margin-top:6px;position:relative;padding-left:4px}
.tl-item{display:flex;gap:14px;position:relative;padding:0 0 4px}
.tl-rail{flex:none;width:16px;position:relative;display:flex;flex-direction:column;align-items:center}
.tl-rail::before{content:"";position:absolute;top:0;bottom:0;width:2px;background:var(--border-strong)}
.tl-item:first-child .tl-rail::before{top:18px}
.tl-item:last-child .tl-rail::before{bottom:auto;height:18px}
.tl-node{width:13px;height:13px;border-radius:50%;background:var(--surface);border:2.5px solid var(--c-custom);margin-top:13px;z-index:1}
.tl-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:opacity .3s,transform .15s}
.tl-card:active{transform:scale(.99)}
.tl-time{flex:none;text-align:right;min-width:54px}
.tl-time .s{display:block;font-size:14px;font-weight:700}
.tl-time .e{display:block;font-size:11.5px;color:var(--faint);margin-top:1px}
.tl-body{flex:1;min-width:0}
.tl-body .t{font-size:15.5px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-body .d{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-chip{flex:none;width:4px;align-self:stretch;border-radius:3px;background:var(--c-custom)}
.tl-item.past .tl-card{opacity:.5}
.tl-item.now .tl-card{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),var(--shadow)}
.tl-item.now .tl-node{border-color:var(--accent);background:var(--accent)}
/* now line */
.now-line{display:flex;align-items:center;gap:8px;margin:2px 0 14px;padding-left:0}
.now-line .nl-rail{flex:none;width:16px;display:flex;justify-content:center}
.now-line .nl-pin{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px var(--amber-soft)}
.now-line .nl-bar{flex:1;height:2px;background:linear-gradient(90deg,var(--amber),transparent)}
.now-line .nl-time{flex:none;font-size:11.5px;font-weight:800;color:var(--amber);letter-spacing:.04em;text-transform:uppercase}

/* ---------- Tasks ---------- */
.quickadd{display:flex;gap:10px;align-items:center;margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 6px 6px 16px;box-shadow:var(--shadow)}
.quickadd input{flex:1;border:none;background:none;outline:none;padding:10px 0}
.quickadd .add-btn{flex:none;width:38px;height:38px;border-radius:10px;background:var(--accent);display:grid;place-items:center;transition:transform .15s,opacity .2s}
.quickadd .add-btn:active{transform:scale(.9)}
.quickadd .add-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round}
html[data-theme="dark"] .quickadd .add-btn svg{stroke:#0a0a0a}

.task{display:flex;align-items:flex-start;gap:13px;padding:14px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;box-shadow:var(--shadow);transition:transform .15s}
.task:active{transform:scale(.995)}
.check{flex:none;width:23px;height:23px;border-radius:7px;border:2px solid var(--border-strong);margin-top:1px;display:grid;place-items:center;transition:.2s}
.check svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.4);transition:.2s}
.task.done .check{background:var(--accent);border-color:var(--accent)}
html[data-theme="dark"] .task.done .check svg{stroke:#0a0a0a}
.task.done .check svg{opacity:1;transform:scale(1)}
.task-body{flex:1;min-width:0}
.task-text{font-size:15.5px;font-weight:500;word-break:break-word;transition:.25s}
.task.done .task-text{text-decoration:line-through;color:var(--faint);text-decoration-thickness:1.5px}
.task-sub{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--surface-2);color:var(--muted)}
.badge.carry{background:var(--amber-soft);color:var(--amber)}
.badge.prio{background:var(--danger-soft);color:var(--danger)}
.task-note{font-size:13px;color:var(--muted);margin-top:4px}
.task-act{flex:none;display:flex;gap:2px;margin-top:-2px}
.mini{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;transition:background .15s}
.mini:active{background:var(--surface-2)}
.mini svg{width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* segmented */
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;margin-top:16px;gap:4px}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted);transition:.2s}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* day chips */
.daychips{display:flex;gap:7px;margin-top:18px;overflow-x:auto;padding:2px 0 6px;-ms-overflow-style:none;scrollbar-width:none}
.daychips::-webkit-scrollbar{display:none}
.chip{flex:none;min-width:46px;padding:9px 4px;border-radius:14px;background:var(--surface);border:1px solid var(--border);text-align:center;transition:.2s;box-shadow:var(--shadow)}
.chip .dn{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.chip .dc{font-size:11px;font-weight:700;color:var(--faint);margin-top:3px}
.chip.on{background:var(--accent);border-color:var(--accent)}
.chip.on .dn{color:#fff}.chip.on .dc{color:rgba(255,255,255,.8)}
html[data-theme="dark"] .chip.on .dn{color:#0a0a0a}
html[data-theme="dark"] .chip.on .dc{color:rgba(10,10,10,.7)}
.chip.today::after{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--amber);margin:3px auto 0}

/* routine event row */
.rev{display:flex;gap:13px;align-items:center;padding:14px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;box-shadow:var(--shadow);transition:transform .15s}
.rev:active{transform:scale(.995)}
.rev-bar{flex:none;width:4px;align-self:stretch;border-radius:3px}
.rev-time{flex:none;min-width:56px}
.rev-time .s{font-size:14px;font-weight:700;display:block}
.rev-time .e{font-size:11px;color:var(--faint);display:block;margin-top:1px}
.rev-body{flex:1;min-width:0}
.rev-body .t{font-size:15px;font-weight:700;letter-spacing:-.01em}
.rev-body .d{font-size:12.5px;color:var(--muted);margin-top:2px}

/* ---------- Insights ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:18px}
.stat{padding:18px;text-align:left}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat .v .u{font-size:14px;font-weight:600;color:var(--muted);margin-left:3px}
.stat .l{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:500}
.stat .ic{font-size:18px;margin-bottom:8px;display:block}
.barchart{padding:20px 18px}
.barchart .bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:6px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.barcol .bar{width:100%;max-width:30px;border-radius:7px 7px 3px 3px;background:var(--accent-soft);position:relative;transition:height .5s ease;min-height:4px}
.barcol .bar .fill{position:absolute;inset:0;border-radius:inherit;background:var(--accent);transform-origin:bottom}
.barcol.empty .bar{background:var(--surface-2)}
.barcol .vlab{font-size:11px;font-weight:700;color:var(--muted)}
.barcol .dlab{font-size:11px;color:var(--faint);font-weight:600}
.barcol.today .dlab{color:var(--amber)}

/* ---------- Empty states ---------- */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .em{font-size:30px;margin-bottom:10px;opacity:.5}
.empty p{margin:0;font-size:14.5px}
.empty .hint{font-size:13px;color:var(--faint);margin-top:4px}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:40;max-width:540px;margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);transition:color .2s;position:relative}
.nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.nav button span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
.nav button.on{color:var(--accent)}
.nav button.on::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}

/* ---------- FAB ---------- */
.fab{position:fixed;right:max(18px,calc(50% - 252px));bottom:calc(var(--nav-h) + var(--safe-bottom) + 18px);width:54px;height:54px;border-radius:18px;background:var(--accent);box-shadow:0 6px 20px rgba(15,118,110,.4);display:none;place-items:center;z-index:45;transition:transform .15s}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round}
html[data-theme="dark"] .fab svg{stroke:#0a0a0a}
html[data-theme="dark"] .fab{box-shadow:0 6px 24px rgba(45,212,191,.3)}

/* ---------- Sheet (modal) ---------- */
.scrim{position:fixed;inset:0;background:rgba(20,20,18,.5);opacity:0;visibility:hidden;transition:.25s;z-index:50;backdrop-filter:blur(2px)}
.scrim.show{opacity:1;visibility:visible}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:540px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:8px 20px calc(24px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:51;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.sheet.show{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:3px;background:var(--border-strong);margin:8px auto 14px}
.sheet h2{margin:0 0 18px;font-size:20px;font-weight:800;letter-spacing:-.02em}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.01em}
.field input,.field textarea,.field select{width:100%;padding:13px 14px;border:1px solid var(--border-strong);border-radius:12px;background:var(--paper);outline:none;transition:border .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:none;min-height:64px;line-height:1.4}
.field-row{display:flex;gap:11px}.field-row .field{flex:1}
.daypick{display:flex;gap:6px;flex-wrap:wrap}
.daypick button{flex:1;min-width:40px;padding:10px 0;border-radius:11px;border:1px solid var(--border-strong);background:var(--paper);font-size:13px;font-weight:600;color:var(--muted);transition:.15s}
.daypick button.on{background:var(--accent);border-color:var(--accent);color:#fff}
html[data-theme="dark"] .daypick button.on{color:#0a0a0a}
.colorpick{display:flex;gap:10px}
.colorpick button{width:34px;height:34px;border-radius:50%;border:2px solid transparent;transition:.15s;position:relative}
.colorpick button.on{transform:scale(1.12)}
.colorpick button.on::after{content:"";position:absolute;inset:4px;border-radius:50%;border:2px solid var(--surface)}
.sheet-actions{display:flex;gap:11px;margin-top:22px}
.btn{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:700;transition:transform .12s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
html[data-theme="dark"] .btn-primary{color:#0a0a0a}
.btn-ghost{background:var(--surface-2);color:var(--ink)}
.btn-danger{background:var(--danger-soft);color:var(--danger);flex:none;width:54px;display:grid;place-items:center}
.btn-danger svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;opacity:0;visibility:hidden;transition:.25s;z-index:60;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;white-space:nowrap}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.toast .undo{color:var(--accent);font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.05em}
html[data-theme="dark"] .toast .undo{color:var(--accent-ink)}
.bottom-pad{height:14px}

/* ---------- date button + back-to-today ---------- */
.datebtn{display:inline-flex;align-items:center;gap:5px;padding:0;margin:0;background:none}
.datebtn .cv{width:19px;height:19px;stroke:var(--muted);fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;margin-top:5px;flex:none}
.datebtn:active{opacity:.6}
.back-today{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:6px 12px;border-radius:20px;background:var(--accent-soft);color:var(--accent-ink);font-size:12.5px;font-weight:700}
.back-today svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.back-today:active{transform:scale(.96)}

/* ---------- upcoming events ---------- */
#upcoming-wrap .rev-up .up-date{color:var(--accent);font-weight:700}
#upcoming-wrap{margin-top:4px}

/* ---------- form: optional pill + or-separator ---------- */
.field label .opt{font-weight:600;color:var(--faint);text-transform:none;letter-spacing:0;font-size:11.5px;background:var(--surface-2);padding:1px 7px;border-radius:10px;margin-left:6px}
.or-sep{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:2px 0 14px}
.or-sep::before,.or-sep::after{content:"";flex:1;height:1px;background:var(--border)}

/* ---------- toggle switch ---------- */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 0 4px;border-top:1px solid var(--border);margin-top:10px}
.toggle-label{font-size:14.5px;font-weight:600}
.toggle-sub{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.35}
.toggle{flex:none;width:50px;height:30px;border-radius:16px;background:var(--border-strong);position:relative;transition:background .2s}
.toggle .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s}
.toggle.on{background:var(--accent)}
.toggle.on .knob{transform:translateX(20px)}

/* ---------- calendar ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:16px;font-weight:700}
.cal-nav{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--surface-2)}
.cal-nav svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.cal-nav:active{transform:scale(.92)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dows{margin-bottom:6px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--faint);padding:4px 0}
.cal-cell{position:relative;aspect-ratio:1;display:grid;place-items:center;border-radius:12px;font-size:14.5px;font-weight:600;color:var(--ink);background:none;font-variant-numeric:tabular-nums}
.cal-cell.empty{pointer-events:none}
.cal-cell:active{background:var(--surface-2)}
.cal-cell.today{color:var(--accent);font-weight:800}
.cal-cell.sel{background:var(--accent);color:#fff}
html[data-theme="dark"] .cal-cell.sel{color:#0a0a0a}
.cal-dot{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:var(--amber)}
.cal-cell.sel .cal-dot{background:#fff}
html[data-theme="dark"] .cal-cell.sel .cal-dot{background:#0a0a0a}
</style>
</head>
<body>
<div class="app">

  <!-- ===== TODAY ===== -->
  <section class="screen active" id="screen-today">
    <div class="head">
      <div>
        <p class="eyebrow" id="today-eyebrow">Today</p>
        <button class="datebtn" id="date-btn" aria-label="Pick a day"><h1 id="today-date">—</h1><svg class="cv" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>
        <p class="sub" id="today-greeting">—</p>
        <button class="back-today" id="back-today" hidden><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>Back to today</button>
      </div>
      <button class="icon-btn" id="theme-btn" aria-label="Toggle theme">
        <svg id="theme-icon" viewBox="0 0 24 24"></svg>
      </button>
    </div>

    <div class="card focus" id="focus-card"></div>

    <div class="section-label"><h2>Your day</h2><span class="count" id="day-count"></span></div>
    <div class="timeline" id="timeline"></div>

    <div class="section-label"><h2 id="today-task-h">To-do today</h2><span class="count" id="today-task-count"></span></div>
    <div class="quickadd" id="today-quickadd">
      <input id="qa-today" placeholder="Add a task for today" maxlength="160" autocomplete="off">
      <button class="add-btn" id="qa-today-btn" aria-label="Add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>
    <div id="today-tasks"></div>
    <div class="bottom-pad"></div>
  </section>

  <!-- ===== ROUTINE ===== -->
  <section class="screen" id="screen-routine">
    <div class="head">
      <div><p class="eyebrow">Weekly</p><h1>Routine</h1><p class="sub">Recurring events, every week</p></div>
    </div>
    <div id="upcoming-wrap"></div>
    <div class="daychips" id="daychips"></div>
    <div class="section-label"><h2 id="routine-day-label">—</h2><span class="count" id="routine-count"></span></div>
    <div id="routine-list"></div>
    <div class="bottom-pad"></div>
  </section>

  <!-- ===== TASKS ===== -->
  <section class="screen" id="screen-tasks">
    <div class="head">
      <div><p class="eyebrow">Checklist</p><h1>Tasks</h1><p class="sub">Carry over until they're done</p></div>
    </div>
    <div class="seg" id="task-seg">
      <button data-seg="active" class="on">Active</button>
      <button data-seg="done">Completed</button>
    </div>
    <div id="tasks-active-wrap">
      <div class="quickadd" style="margin-top:16px">
        <input id="qa-tasks" placeholder="Add a task" maxlength="160" autocomplete="off">
        <button class="add-btn" id="qa-tasks-btn" aria-label="Add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div id="tasks-active" style="margin-top:14px"></div>
    </div>
    <div id="tasks-done" style="display:none;margin-top:16px"></div>
    <div class="bottom-pad"></div>
  </section>

  <!-- ===== INSIGHTS ===== -->
  <section class="screen" id="screen-insights">
    <div class="head">
      <div><p class="eyebrow">Progress</p><h1>Insights</h1><p class="sub">How your week is going</p></div>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="section-label"><h2>Tasks completed</h2><span class="count">Last 7 days</span></div>
    <div class="card barchart" id="barchart"></div>
    <div class="section-label"><h2>This week's load</h2></div>
    <div class="card barchart" id="loadchart"></div>
    <div class="bottom-pad"></div>
  </section>

  <!-- FAB (routine only) -->
  <button class="fab" id="fab" aria-label="Add event"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>

  <!-- Bottom nav -->
  <nav class="nav" id="nav">
    <button data-tab="today" class="on">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Today</span>
    </button>
    <button data-tab="routine">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg><span>Routine</span>
    </button>
    <button data-tab="tasks">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8M4 12l3 3M4 6l3 3 2-2M4 18l3 3 2-2"/></svg><span>Tasks</span>
    </button>
    <button data-tab="insights">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18M8 14v4M13 10v8M18 6v12"/></svg><span>Insights</span>
    </button>
  </nav>
</div>

<!-- Scrim + Sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
